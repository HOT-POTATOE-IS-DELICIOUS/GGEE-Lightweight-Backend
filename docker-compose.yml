services:
  postgres:
    image: postgres:17
    container_name: ggee-lw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: ggee-lw-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ggee-lw-backend
    restart: unless-stopped
    env_file:
      # Injects every var from .env (JWT, CORS, snowflake, AI base URLs, crawler URL, ...).
      # The AI/crawler URLs are used verbatim, so point them at addresses reachable from
      # inside this container: an external host/IP, or host.docker.internal for the host.
      - .env
    environment:
      # Where the backend CONTAINER reaches its datastores. These override the host-facing
      # values in .env. Leave the BACKEND_* vars unset to use the bundled services below;
      # set them in .env to an external host/IP to use a managed database or cache.
      DATABASE_HOST: ${BACKEND_DATABASE_HOST:-postgres}
      DATABASE_PORT: ${BACKEND_DATABASE_PORT:-5432}
      REDIS_HOST: ${BACKEND_REDIS_HOST:-redis}
      REDIS_PORT: ${BACKEND_REDIS_PORT:-6379}
    extra_hosts:
      # Makes host.docker.internal resolve on Linux too, not just Docker Desktop.
      - "host.docker.internal:host-gateway"
    ports:
      - "${SERVER_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
